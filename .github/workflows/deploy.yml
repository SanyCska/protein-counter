name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set SSH port
        id: ssh_port
        run: |
          P="${{ secrets.SSH_PORT }}"
          if [ -z "$P" ]; then
            echo "value=22" >> "$GITHUB_OUTPUT"
          else
            echo "value=$P" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        env:
          PORT: ${{ steps.ssh_port.outputs.value }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PORT: ${{ steps.ssh_port.outputs.value }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -p "$PORT" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p -- ${DEPLOY_PATH}"

      - name: Rsync to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PORT: ${{ steps.ssh_port.outputs.value }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -p ${PORT}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='.idea' \
            --exclude='data' \
            --exclude='*.sqlite3' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_PATH}/"

      - name: Write .env and restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ steps.ssh_port.outputs.value }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            umask 077
            {
              echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
              echo "OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}"
              echo "TZ=${{ secrets.TZ }}"
              echo "PROTEIN_DB_PATH=/app/data/protein.sqlite3"
            } > .env
            chmod 600 .env
            docker compose up -d --build --remove-orphans
